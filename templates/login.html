{% extends "base.html" %}
{% block title %}Login | MetaGuard{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card bg-black border-secondary text-light">
      <div class="card-body p-4">
        <h3 class="card-title mb-1">Sign in</h3>
        <p class="text-secondary small mb-4">Enter the AI-protected metaverse.</p>
        <form method="POST" action="{{ url_for('auth.login') }}">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" name="username" id="username" class="form-control bg-dark text-light border-secondary" autofocus required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" name="password" id="password" class="form-control bg-dark text-light border-secondary" required>
          </div>
          <button type="submit" class="btn btn-info w-100">Login</button>
        </form>
        <div class="text-center mt-3 small text-secondary">
          No account? <a href="{{ url_for('auth.register') }}">Register here</a>.
        </div>
      </div>
    </div>
    <div class="card bg-black border-secondary text-secondary mt-3 small">
      <div class="card-body py-2 px-3">
        <strong class="text-info">Demo accounts:</strong>
        admin / admin123 &nbsp;·&nbsp; alice / password123 &nbsp;·&nbsp; bob / password123
      </div>
    </div>
  </div>
</div>
{% endblock %}
